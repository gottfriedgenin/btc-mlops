# MLflow values for community-charts/mlflow chart.
#
# Project-specific values (GCS bucket, WI SA annotation) are NOT in this file
# — they're injected by the ApplicationSet in platform/argocd/apps/mlflow.yaml
# using `{{metadata.annotations.gcp_project}}` from the in-cluster Secret.
# The cluster Secret is created and annotated by platform/argocd/bootstrap.sh
# at install time. Project id never enters git.
#
# Backend store: SQLite in /tmp/mlflow.db — survives within a pod's lifetime,
# lost on restart. To upgrade to postgres, switch the postgres block on and
# point host at the corresponding service.

backendStore:
  databaseConnectionCheck: false
  defaultSqlitePath: "/tmp/mlflow.db"
  postgres:
    enabled: false
  mysql:
    enabled: false

artifactRoot:
  proxiedArtifactStorage: false
  gcs:
    enabled: true
    # bucket: <set via ApplicationSet helm.parameters>

service:
  enabled: true
  type: ClusterIP
  port: 5000
  name: http

serviceAccount:
  create: true
  name: mlflow
  # annotations.iam.gke.io/gcp-service-account: <set via ApplicationSet helm.parameters>

# MLflow 3.5+ validates the HTTP Host header and rejects unknown hosts with
# "Invalid Host header - possible DNS rebinding attack detected" (see
# mlflow/server/security_utils.py:is_allowed_host_header).
# Match is exact string comparison INCLUDING the port — unless the allow-list
# entry contains a `*`, which switches to fnmatch. The KFP pipeline calls
# http://mlflow.mlflow.svc.cluster.local:5000, so the in-cluster Service DNS
# is not in the default localhost+private-IP allow-list. Wildcard so the
# entry matches both with and without :PORT.
extraEnvVars:
  MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow.mlflow.svc.cluster.local*,localhost,127.0.0.1"
