apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.ksaName }}
  namespace: {{ .Values.namespace }}
  annotations:
    # Workload Identity binding: KSA serving/btc-serving → GCP serving-sa.
    # Matches infra/modules/iam/main.tf:google_service_account_iam_member.serving_wi.
    iam.gke.io/gcp-service-account: {{ printf "%s@%s.iam.gserviceaccount.com" .Values.gcpServiceAccount .Values.gcpProject | quote }}
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of:    btc-mlops
