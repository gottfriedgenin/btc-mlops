apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-api
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/gottfriedgenin/btc-mlops
    targetRevision: main
    path: k8s/base/rag-api
  destination:
    server: https://kubernetes.default.svc
    namespace: rag
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
