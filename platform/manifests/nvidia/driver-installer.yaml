# GKE COS driver installer — vendored from:
#   https://github.com/GoogleCloudPlatform/container-engine-accelerators
#   nvidia-driver-installer/cos/daemonset-preloaded.yaml
#
# Pinned to a specific upstream SHA via the comment below so Argo diffs are
# visible when we bump it. Refresh by re-curling the file and committing.
#
# Source SHA: replace-with-actual-sha-when-vendored
#
# This is a no-op on non-COS nodes; safe to deploy cluster-wide.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-driver-installer
  namespace: kube-system
  labels:
    k8s-app: nvidia-driver-installer
spec:
  selector:
    matchLabels:
      k8s-app: nvidia-driver-installer
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-driver-installer
        k8s-app: nvidia-driver-installer
    spec:
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-accelerator
                    operator: Exists
                  - key: cloud.google.com/gke-os-distribution
                    operator: In
                    values: ["cos"]
      tolerations:
        - operator: Exists
      hostNetwork: true
      hostPID: true
      volumes:
        - name: dev
          hostPath: { path: /dev }
        - name: vulkan-icd-mount
          hostPath: { path: /home/kubernetes/bin/nvidia/vulkan/icd.d }
        - name: nvidia-install-dir-host
          hostPath: { path: /home/kubernetes/bin/nvidia }
        - name: root-mount
          hostPath: { path: / }
        - name: cos-tools
          hostPath: { path: /var/lib/cos-tools }
      initContainers:
        - image: gcr.io/cos-cloud/cos-gpu-installer:v2.3.4
          name: nvidia-driver-installer
          resources:
            requests:
              cpu: 150m
          securityContext:
            privileged: true
          env:
            - name: NVIDIA_INSTALL_DIR_HOST
              value: /home/kubernetes/bin/nvidia
            - name: NVIDIA_INSTALL_DIR_CONTAINER
              value: /usr/local/nvidia
            - name: VULKAN_ICD_DIR_HOST
              value: /home/kubernetes/bin/nvidia/vulkan/icd.d
            - name: VULKAN_ICD_DIR_CONTAINER
              value: /etc/vulkan/icd.d
            - name: ROOT_MOUNT_DIR
              value: /root
            - name: COS_TOOLS_DIR_HOST
              value: /var/lib/cos-tools
            - name: COS_TOOLS_DIR_CONTAINER
              value: /build/cos-tools
          volumeMounts:
            - name: nvidia-install-dir-host
              mountPath: /usr/local/nvidia
            - name: vulkan-icd-mount
              mountPath: /etc/vulkan/icd.d
            - name: dev
              mountPath: /dev
            - name: root-mount
              mountPath: /root
            - name: cos-tools
              mountPath: /build/cos-tools
      containers:
        - image: "registry.k8s.io/pause:3.8"
          name: pause
